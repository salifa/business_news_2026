# HTTPS configuration with SSL/TLS
# Use this after obtaining SSL certificates with certbot
# Save to: /etc/nginx/sites-available/vnn.mac.in.th

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name vnn.mac.in.th;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vnn.mac.in.th;

    # SSL certificates (update paths after running certbot)
    ssl_certificate /etc/letsencrypt/live/vnn.mac.in.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vnn.mac.in.th/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory
    root /websites/vnn.mac.in.th;
    index index.php index.html index.htm;

    # Logs
    access_log /var/log/nginx/vnn.mac.in.th-access.log;
    error_log /var/log/nginx/vnn.mac.in.th-error.log;

    # Static files
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}
