# HTTP configuration (use this initially before SSL setup)
# Save to: /etc/nginx/sites-available/vnn.mac.in.th
# Then create symlink: sudo ln -s /etc/nginx/sites-available/vnn.mac.in.th /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name vnn.mac.in.th;

    # Root directory
    root /websites/vnn.mac.in.th;
    index index.php index.html index.htm;

    # Logs
    access_log /var/log/nginx/vnn.mac.in.th-access.log;
    error_log /var/log/nginx/vnn.mac.in.th-error.log;

    # Static files
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}
